name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "V*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-target: ""
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: macos-14-large
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "V__VERSION__"
          releaseName: "CLI-Manager V__VERSION__"
          releaseBody: |
            ## 安装

            | 平台 | 格式 |
            |------|------|
            | Windows | `.msi` 安装包 |
            | macOS (Apple Silicon) | `.dmg` 磁盘映像 |
            | macOS (Intel) | `.dmg` 磁盘映像 |
            | Linux | `.deb` / `.AppImage` |

            > - Windows 首次安装可能触发 SmartScreen 提示，点击"仍要运行"继续
            > - macOS 首次打开需在"系统设置 → 隐私与安全性"中允许运行

            ## 变更日志

            详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
